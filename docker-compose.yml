services:
  # Database Service
  db:
    image: postgres:15-alpine
    container_name: simple-crew-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-simple-crew-builder}
    # Security: Internal communication only. Use .env to override if needed for local tools.
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - simple-crew-network

  # Backend Service (Puxando do Docker Hub)
  backend:
    image: gleisonsouza/simple-crew-builder-backend:latest
    container_name: simple-crew-backend
    restart: always
    depends_on:
      - db
      - neo4j
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-simple-crew-builder}
      - POSTGRES_DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-simple-crew-builder}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-simplecrew2026}
    networks:
      - simple-crew-network
    ports:
      - "8000:8000"
    volumes:
      - backend_workspaces:/app/workspaces

  # Frontend Service (Puxando do Docker Hub - Nginx com Reverse Proxy)
  frontend:
    image: gleisonsouza/simple-crew-builder-frontend:latest
    container_name: simple-crew-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - simple-crew-network

  # Neo4j Graph & Vector Database (Production)
  neo4j:
    image: neo4j:5.23.0
    container_name: simple-crew-neo4j
    restart: always
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-simplecrew2026}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    ports:
      - "7474:7474" # Neo4j Browser
      - "7687:7687" # Bolt protocol
    volumes:
      - neo4j_data_prod:/data
      - neo4j_logs_prod:/logs
    networks:
      - simple-crew-network

volumes:
  postgres_data:
  backend_workspaces:
  neo4j_data_prod:
  neo4j_logs_prod:

networks:
  simple-crew-network:
    driver: bridge